name: Check Ruff Formatting

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  format:
    name: Run Ruff Formatter Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Ruff
        run: pip install ruff

      - name: Check Ruff Formatting
        run: ruff format --check .
